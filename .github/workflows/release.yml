name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build app bundle
        run: make app GO=go

      - name: Package zip
        run: |
          cd build
          ditto -c -k --sequesterRsrc CryptoBar.app CryptoBar-${{ github.ref_name }}-macOS.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/CryptoBar-${{ github.ref_name }}-macOS.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
